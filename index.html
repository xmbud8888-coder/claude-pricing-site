<head>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
</head>
<body class="landing">

<nav class="topnav landing-nav" id="landingNav">
  <div class="wrap topnav-in">
    <a class="brand" href="index.html"><span class="brand-name">AI 定价站</span></a>
  </div>
</nav>

<main>
<section class="landing-hero">
  <div class="wrap">
    <h1 id="typeline" aria-label="同一个产品，全球不是一个价。"><span id="typed"></span><span class="caret" aria-hidden="true"></span></h1>
    <p class="landing-sub">每个数字都来自官方接口，每天自动核验。核验不到的，如实告诉你。</p>
  </div>
</section>

<section class="landing-cards">
  <div class="wrap entry-grid" id="entryGrid">
    <a class="entry-card" href="ai.html">
      <p class="eyebrow">找性价比</p>
      <h2>全球区域定价对比</h2>
      <p>AI 订阅、Steam 与 eShop 游戏、流媒体服务在全球各区的真实价格，最便宜的地区一眼可见。</p>
    </a>
    <a class="entry-card" href="gift-cards.html" rel="nofollow">
      <p class="eyebrow">解决支付</p>
      <h2>Apple 礼品卡对比</h2>
      <p>换区之后怎么付款？各国礼品卡的官方面额、发行渠道与避坑要点，一页说清。</p>
    </a>
    <a class="entry-card" href="vpn.html">
      <p class="eyebrow">解决访问</p>
      <h2>VPN 榜单与事实库</h2>

    </a>
  </div>
</section>
</main>

<script>
(function () {
  var text = "同一个产品，全球不是一个价。";
  var typed = document.getElementById("typed");
  var grid = document.getElementById("entryGrid");
  var nav = document.getElementById("landingNav");
  var reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
  function reveal() {
    nav.classList.add("revealed");
    grid.classList.add("revealed");
  }
  if (reduced) { typed.textContent = text; document.body.classList.add("no-anim"); reveal(); return; }
  var i = 0;
  (function tick() {
    typed.textContent = text.slice(0, ++i);
    if (i < text.length) setTimeout(tick, 55 + Math.random() * 45);
    else setTimeout(reveal, 250);
  })();
})();
</script>
</body>
</html>
